<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SketchSync</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <!-- Join Overlay -->
    <div id="join-overlay" class="overlay">
        <div class="overlay-card glass">
            <h1>🎨 SketchSync</h1>
            <p>Collaborative Drawing in Real-Time</p>
            <input type="text" id="username-input" placeholder="Enter your name" maxlength="20">
            
            <div class="room-options">
                <div class="room-section">
                    <h3 class="room-section-title">Public Rooms</h3>
                    <p class="room-section-subtitle">Draw with anyone online</p>
                    <button id="btn-public-a" class="room-btn">Join Public Room A</button>
                    <button id="btn-public-b" class="room-btn">Join Public Room B</button>
                </div>
                
                <div class="room-section-divider">OR</div>

                <div class="room-section">
                    <h3 class="room-section-title">Private Room</h3>
                    <p class="room-section-subtitle">Draw with friends using a secret code</p>
                    <div class="private-room-container">
                        <input type="text" id="private-room-input" placeholder="Enter Room ID" maxlength="20">
                        <button id="btn-private-join" class="room-btn primary">Join Private</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Navbar (Absolute positioned over canvas) -->
        <header class="navbar glass">
            <div class="navbar-left">
                <button class="nav-btn hidden-on-desktop" id="btn-toggle-users" title="Toggle Users">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <span>Users</span>
                </button>
                <h2>🎨 SketchSync</h2>
            </div>
            <div class="navbar-right">
                <button class="nav-btn" id="btn-leave-room" title="Change Room">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                    <span>Leave</span>
                </button>
                <button class="nav-btn" id="theme-toggle" title="Toggle Theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <h2>Users</h2>
                <div id="connection-status" class="status connected" title="Connected"></div>
            </div>
            <ul id="user-list">
                <!-- User items injected here -->
            </ul>
        </aside>

        <!-- Main Canvas Area -->
        <main class="canvas-container">
            <!-- Double buffering: static canvas for history, dynamic canvas for active strokes/cursors -->
            <canvas id="static-canvas"></canvas>
            <canvas id="dynamic-canvas"></canvas>
        </main>

        <!-- Toolbar -->
        <div class="toolbar glass">
            <div class="tool-group">
                <button class="tool-btn active" id="tool-brush" title="Brush">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                </button>
                <button class="tool-btn" id="tool-eraser" title="Eraser">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 21H7l-4-4c-.5-.5-.5-1.5 0-2l10-10c.5-.5 1.5-.5 2 0l5 5c.5.5.5 1.5 0 2l-9 9H21v-2z" />
                        <path d="M17 7l-8 8" />
                    </svg>
                </button>
                <button class="tool-btn" id="tool-shape" title="Shapes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" /><circle cx="17.5" cy="17.5" r="4.5" /><path d="M14 7l7 0M7 14l0 7" /></svg>
                </button>
                <button class="tool-btn" id="tool-text" title="Text">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7V4h16v3M12 4v16M8 20h8" /></svg>
                </button>
            </div>
            
            <div class="tool-group hidden" id="eraser-options">
                <label class="switch-label">
                    <span>Pixel</span>
                    <label class="switch">
                        <input type="checkbox" id="eraser-mode-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span>Stroke</span>
                </label>
            </div>

            <div class="tool-group hidden" id="shape-options">
                <select id="shape-type-select" class="glass-select">
                    <option value="rectangle">Rectangle</option>
                    <option value="circle">Circle</option>
                    <option value="line">Line</option>
                </select>
            </div>
            
            <div class="tool-group">
                <input type="color" id="color-picker" value="#000000" title="Color">
                <input type="range" id="width-slider" min="1" max="50" value="5" title="Stroke Width">
            </div>

            <div class="tool-group">
                <button class="tool-btn" id="btn-undo" title="Undo Last Stroke (Global)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" /></svg>
                </button>
                <button class="tool-btn" id="btn-redo" title="Redo (Global)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6" /></svg>
                </button>
                <button class="tool-btn" id="btn-clear" title="Clear Canvas">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                </button>
            </div>

            <div class="tool-group">
                <button class="tool-btn" id="btn-zoom-out" title="Zoom Out">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7" /></svg>
                </button>
                <button class="tool-btn" id="btn-zoom-reset" title="Reset Zoom/Pan">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                </button>
                <button class="tool-btn" id="btn-zoom-in" title="Zoom In">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                </button>
            </div>

        </div>
    </div>
    
    <!-- Load the compiled TS entry point as a native ES module -->
    <script type="module" src="dist/main.js"></script>
</body>
</html>
